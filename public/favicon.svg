<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5a6a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#0a0c12"/>

  <!-- Screen frame -->
  <rect x="40" y="50" width="120" height="100" rx="8" fill="none" stroke="url(#faviconGradient)" stroke-width="3"/>

  <!-- Play button -->
  <polygon points="80,75 80,125 130,100" fill="url(#faviconGradient)"/>
</svg>