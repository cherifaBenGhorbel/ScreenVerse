[build]
  command = "npm run build"
  publish = "dist/movie-platform/browser"

# Build-time context for local development
[build.environment]
  # These are defaults; Netlify Site Settings env vars override these

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/tmdb/*"
  to = "/.netlify/functions/tmdb/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/watch/*"
  to = "/.netlify/functions/watch/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
